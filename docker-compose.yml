services:
  resume-admin-panel:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.singularity-resume.ru}
    image: resume-admin-panel:latest
    container_name: resume-admin-panel
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3847}:3847"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
